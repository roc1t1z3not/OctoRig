services:
  postgres:
    image: postgres:16-alpine
    container_name: octorig-platform-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: octorig
      POSTGRES_USER: octorig
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-octorig}"
    volumes:
      - platform-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U octorig"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - platform-internal

  redis:
    image: redis:7-alpine
    container_name: octorig-platform-redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - platform-internal

  backend:
    build:
      context: ./backend
    container_name: octorig-platform-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+psycopg2://octorig:${POSTGRES_PASSWORD:-octorig}@postgres:5432/octorig"
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production}"
      LABS_ROOT: /octorig/labs
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@octorig.local}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-changeme}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:3000}"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/1"
      REDIS_URL: "redis://redis:6379/0"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ..:/octorig:ro
    networks:
      - platform-internal
    ports:
      - "8000:8000"

  celery-worker:
    build:
      context: ./backend
    container_name: octorig-platform-worker
    restart: unless-stopped
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+psycopg2://octorig:${POSTGRES_PASSWORD:-octorig}@postgres:5432/octorig"
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production}"
      LABS_ROOT: /octorig/labs
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/1"
      REDIS_URL: "redis://redis:6379/0"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ..:/octorig:ro
    networks:
      - platform-internal

  celery-beat:
    build:
      context: ./backend
    container_name: octorig-platform-beat
    restart: unless-stopped
    command: celery -A app.worker.celery_app beat --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+psycopg2://octorig:${POSTGRES_PASSWORD:-octorig}@postgres:5432/octorig"
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production}"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/1"
      REDIS_URL: "redis://redis:6379/0"
    networks:
      - platform-internal

  frontend-dev:
    image: node:22-alpine
    container_name: octorig-platform-ui
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      API_URL: "http://backend:8000"
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
      - frontend-next-cache:/app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - platform-internal
    profiles:
      - dev

volumes:
  platform-postgres-data:
  frontend-node-modules:
  frontend-next-cache:

networks:
  platform-internal:
    driver: bridge
