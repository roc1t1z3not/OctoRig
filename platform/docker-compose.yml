services:
  postgres:
    image: postgres:16-alpine
    container_name: octorig-platform-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: octorig
      POSTGRES_USER: octorig
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-octorig}"
    volumes:
      - platform-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U octorig"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - platform-internal

  redis:
    image: redis:7-alpine
    container_name: octorig-platform-redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - platform-internal

  # Docker socket proxy — limits which Docker API operations backend/worker can
  # perform. Removes the raw /var/run/docker.sock bind-mount from application
  # containers so a compromised process cannot directly escalate to host root.
  socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: octorig-socket-proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # Read operations
      CONTAINERS: 1
      NETWORKS: 1
      VOLUMES: 1
      IMAGES: 1
      INFO: 1
      # Write operations required for full lab lifecycle
      POST: 1     # create containers, networks, volumes
      DELETE: 1   # remove containers, networks, volumes
      BUILD: 1    # build images from Dockerfile contexts
      EXEC: 1     # exec in containers (required for VulnAD _populate_ad post-start)
      # Deny everything else
      AUTH: 0
      SECRETS: 0
      SWARM: 0
      SERVICES: 0
      TASKS: 0
      NODES: 0
      CONFIGS: 0
      PLUGINS: 0
    # Expose only on the internal network — never on the host
    networks:
      - platform-internal

  migrate:
    build:
      context: ./backend
    container_name: octorig-platform-migrate
    command: python -m app.cli migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+psycopg2://octorig:${POSTGRES_PASSWORD:-octorig}@postgres:5432/octorig"
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-changeme}"
    networks:
      - platform-internal
    restart: "no"

  backend:
    build:
      context: ./backend
    container_name: octorig-platform-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      socket-proxy:
        condition: service_started
    environment:
      DATABASE_URL: "postgresql+psycopg2://octorig:${POSTGRES_PASSWORD:-octorig}@postgres:5432/octorig"
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production}"
      LABS_ROOT: /octorig/labs
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@octorig.local}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-changeme}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:3000}"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/1"
      REDIS_URL: "redis://redis:6379/0"
      DOCKER_HOST: "tcp://socket-proxy:2375"
    volumes:
      - ..:/octorig:ro
    networks:
      - platform-internal
    ports:
      - "8000:8000"

  celery-worker:
    build:
      context: ./backend
    container_name: octorig-platform-worker
    restart: unless-stopped
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=4 -Q lab_ops,celery
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      socket-proxy:
        condition: service_started
    environment:
      DATABASE_URL: "postgresql+psycopg2://octorig:${POSTGRES_PASSWORD:-octorig}@postgres:5432/octorig"
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production}"
      LABS_ROOT: /octorig/labs
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/1"
      REDIS_URL: "redis://redis:6379/0"
      DOCKER_HOST: "tcp://socket-proxy:2375"
    volumes:
      - ..:/octorig:ro
    networks:
      - platform-internal

  celery-beat:
    build:
      context: ./backend
    container_name: octorig-platform-beat
    restart: unless-stopped
    command: celery -A app.worker.celery_app beat --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: "postgresql+psycopg2://octorig:${POSTGRES_PASSWORD:-octorig}@postgres:5432/octorig"
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production}"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/1"
      REDIS_URL: "redis://redis:6379/0"
    networks:
      - platform-internal

  frontend-dev:
    image: node:22-alpine
    container_name: octorig-platform-ui
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      API_URL: "http://backend:8000"
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
      - frontend-next-cache:/app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - platform-internal
    profiles:
      - dev

volumes:
  platform-postgres-data:
  frontend-node-modules:
  frontend-next-cache:

networks:
  platform-internal:
    driver: bridge
