{% extends 'base.html' %}
{% block title %}Place Order{% endblock %}
{% block content %}
<div class="container" style="max-width:600px;">
  <div class="page-header"><h1>PLACE ORDER</h1></div>

  {% if message %}<div class="alert alert-success">{{ message }}</div>{% endif %}
  {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}

  <form method="post" class="detail-panel">
    <div class="form-group">
      <label>SYMBOL</label>
      <select name="symbol">
        {% for s in symbols %}
        <option value="{{ s.symbol }}">{{ s.symbol }} — {{ s.name }} (${{ "%.2f"|format(s.price) }})</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>ACTION</label>
      <select name="action">
        <option value="buy">BUY</option>
        <option value="sell">SELL</option>
      </select>
    </div>
    <div class="form-group">
      <label>QUANTITY</label>
      <input type="number" name="quantity" min="1" value="1">
    </div>
    <div class="form-group">
      <label>ORDER TYPE</label>
      <select name="order_type">
        <option value="market">MARKET</option>
        <option value="limit">LIMIT</option>
      </select>
    </div>
    <div class="form-group">
      <label>LIMIT PRICE (leave 0 for market orders)</label>
      <input type="number" name="price" step="0.01" value="0">
    </div>
    <button class="btn" type="submit">Submit Order</button>
  </form>
</div>
{% endblock %}
