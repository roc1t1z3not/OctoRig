{% extends 'base.html' %}
{% block title %}New Alert{% endblock %}
{% block content %}
<div class="container" style="max-width:560px;">
  <div class="page-header"><h1>NEW ALERT</h1></div>
  {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
  <form method="post" class="detail-panel">
    <div class="form-group"><label>ALERT NAME</label><input type="text" name="name" autofocus></div>
    <div class="form-group">
      <label>SYMBOL</label>
      <select name="symbol">
        {% for s in symbols %}
        <option value="{{ s.symbol }}">{{ s.symbol }} — {{ s.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>CONDITION</label>
      <select name="condition">
        <option value="above">PRICE ABOVE</option>
        <option value="below">PRICE BELOW</option>
      </select>
    </div>
    <div class="form-group"><label>THRESHOLD ($)</label><input type="number" name="threshold" step="0.01" value="0"></div>
    <button class="btn" type="submit">Create Alert</button>
    &nbsp;<a href="{{ url_for('alerts') }}" class="btn btn-sm btn-amber">Cancel</a>
  </form>
</div>
{% endblock %}
