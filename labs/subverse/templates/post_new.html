{% extends "base.html" %}
{% block title %}Create Post — SubVerse{% endblock %}
{% block content %}
<div class="container">
  <div style="max-width:700px;margin:0 auto;">
    <div class="page-header">
      <h2>Create a Post</h2>
    </div>
    {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
    <div class="widget">
      <div class="widget-header">New Post</div>
      <div class="widget-body">
        <form method="post" action="{{ url_for('post_new') }}">
          <div class="form-group">
            <label>Community</label>
            <select name="community_id" required>
              <option value="">Choose a community...</option>
              {% for c in communities %}
              <option value="{{ c['id'] }}">sv/{{ c['name'] }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="form-group">
            <label>Title</label>
            <input type="text" name="title" placeholder="Post title" required>
          </div>
          <div class="form-group">
            <label>Flair (optional)</label>
            <input type="text" name="flair" placeholder="e.g. Discussion, News, Question">
          </div>
          <div class="form-group">
            <label>Body (optional — supports HTML)</label>
            <textarea name="body" rows="10" placeholder="Share your thoughts..."></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Post</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
