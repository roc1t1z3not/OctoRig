{% extends "base.html" %}
{% block title %}Sign In — SubVerse{% endblock %}
{% block content %}
<div class="form-card">
  <h2>Sign In to SubVerse</h2>
  {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
  <form method="post" action="{{ url_for('login') }}{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" autofocus required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" required>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:0.25rem;">Sign In</button>
  </form>
  <p style="color:var(--muted);font-size:0.82rem;margin-top:1.25rem;text-align:center;">
    No account? <a href="{{ url_for('register') }}">Create one</a> &bull;
    <a href="{{ url_for('reset_request') }}">Forgot password?</a>
  </p>
</div>
{% endblock %}
