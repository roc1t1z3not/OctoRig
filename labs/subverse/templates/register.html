{% extends "base.html" %}
{% block title %}Join SubVerse{% endblock %}
{% block content %}
<div class="form-card">
  <h2>Create an Account</h2>
  {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
  <form method="post" action="{{ url_for('register') }}">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" autofocus required>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" required>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:0.25rem;">Create Account</button>
  </form>
  <p style="color:var(--muted);font-size:0.82rem;margin-top:1.25rem;text-align:center;">
    Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
  </p>
</div>
{% endblock %}
