{% extends "base.html" %}
{% block title %}Compose Message — SubVerse{% endblock %}
{% block content %}
<div class="feed-layout" style="justify-content:center;">
  <div style="max-width:600px;width:100%;">
    <h2 style="margin-bottom:1rem;">Compose Message</h2>
    {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
    <div class="sidebar-widget">
      <form method="post" action="{{ url_for('message_new') }}">
        <label>To (username)</label>
        <input type="text" name="to" value="{{ to }}" required autofocus>
        <label>Subject</label>
        <input type="text" name="subject" required>
        <label>Message</label>
        <textarea name="body" rows="8" required></textarea>
        <div style="display:flex;gap:0.5rem;margin-top:0.5rem;">
          <button type="submit" class="btn btn-primary">Send</button>
          <a href="{{ url_for('messages_inbox') }}" class="btn">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
