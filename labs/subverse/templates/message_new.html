{% extends "base.html" %}
{% block title %}Compose Message — SubVerse{% endblock %}
{% block content %}
<div class="container">
  <div style="max-width:600px;margin:0 auto;">
    <div class="page-header">
      <h2>Compose Message</h2>
    </div>
    {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
    <div class="widget">
      <div class="widget-header">New Message</div>
      <div class="widget-body">
        <form method="post" action="{{ url_for('message_new') }}">
          <div class="form-group">
            <label>To (username)</label>
            <input type="text" name="to" value="{{ to }}" required autofocus>
          </div>
          <div class="form-group">
            <label>Subject</label>
            <input type="text" name="subject" required>
          </div>
          <div class="form-group">
            <label>Message</label>
            <textarea name="body" rows="8" required></textarea>
          </div>
          <div style="display:flex;gap:0.5rem;">
            <button type="submit" class="btn btn-primary">Send</button>
            <a href="{{ url_for('messages_inbox') }}" class="btn">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
