{% extends "base.html" %}
{% block title %}Set New Password — SubVerse{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <h2>Set New Password</h2>
    {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
    {% if success %}<div class="alert alert-success">{{ success }} <a href="{{ url_for('login') }}">Sign in</a></div>{% endif %}
    {% if valid and not success %}
    <form method="post" action="{{ url_for('reset_confirm', token=token) }}">
      <label>New Password</label>
      <input type="password" name="password" autofocus required>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.5rem;">Update Password</button>
    </form>
    {% endif %}
    <p class="muted" style="margin-top:1rem;text-align:center;"><a href="{{ url_for('login') }}">Back to Sign In</a></p>
  </div>
</div>
{% endblock %}
