{% extends "base.html" %}
{% block title %}Reset Password — SubVerse{% endblock %}
{% block content %}
<div class="form-card">
  <h2>Reset Password</h2>
  {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
  {% if info %}<div class="alert alert-info">{{ info }}</div>{% endif %}
  <form method="post" action="{{ url_for('reset_request') }}">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" autofocus required>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Get Reset Link</button>
  </form>
  <p style="color:var(--muted);font-size:0.82rem;margin-top:1.25rem;text-align:center;">
    <a href="{{ url_for('login') }}">Back to Sign In</a>
  </p>
</div>
{% endblock %}
