{% extends "base.html" %}
{% block title %}Link Preview — SubVerse{% endblock %}
{% block content %}
<div class="container">
  <div style="max-width:760px;margin:0 auto;">
    <div class="page-header">
      <h2>&#128279; Link Preview</h2>
    </div>
    {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
    <div class="widget">
      <div class="widget-header">Fetch URL</div>
      <div class="widget-body">
        <form method="post" action="{{ url_for('post_preview_link') }}">
          <div style="display:flex;gap:0.5rem;margin-bottom:0.5rem;">
            <input type="text" name="url" value="{{ url }}" placeholder="https://..." style="flex:1;">
            <button type="submit" class="btn btn-primary btn-sm">Fetch</button>
          </div>
        </form>
        {% if output %}
        <pre class="output-pre">{{ output }}</pre>
        {% endif %}
      </div>
    </div>
  </div>
</div>
{% endblock %}
