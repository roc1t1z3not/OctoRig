{% extends 'base.html' %}
{% block title %}New Thread{% endblock %}
{% block content %}
<div class="container" style="max-width:700px;">
  <div class="page-header"><h1>NEW THREAD</h1></div>
  {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
  <form method="post" class="detail-panel">
    <div class="form-group">
      <label>TITLE</label>
      <input type="text" name="title" autofocus>
    </div>
    <div class="form-group">
      <label>MESSAGE</label>
      <textarea name="body" rows="6"></textarea>
    </div>
    <button class="btn" type="submit">Post Thread</button>
    &nbsp;<a href="{{ url_for('board') }}" class="btn btn-sm btn-amber">Cancel</a>
  </form>
</div>
{% endblock %}
