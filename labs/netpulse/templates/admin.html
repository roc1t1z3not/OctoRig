{% extends 'base.html' %}
{% block title %}Admin{% endblock %}
{% block content %}
<div class="container">
  <div class="page-header"><h1>ADMIN PANEL</h1></div>
  <div class="stat-grid">
    <div class="stat-box">
      <div class="stat-label">TOTAL MEMBERS</div>
      <div class="stat-value">{{ user_count }}</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">OPEN TICKETS</div>
      <div class="stat-value">{{ open_tickets }}</div>
    </div>
  </div>
  <div class="section-title">ADMIN TOOLS</div>
  <p><a href="{{ url_for('admin_users') }}">&rarr; Manage Members</a></p>
  <p class="mt1"><a href="{{ url_for('admin_templates') }}">&rarr; Notification Templates</a></p>
</div>
{% endblock %}
