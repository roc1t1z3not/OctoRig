{% extends 'base.html' %}
{% block title %}DNS Lookup{% endblock %}
{% block content %}
<div class="container">
  <div class="page-header">
    <h1>DNS LOOKUP</h1>
    <p>Resolve a hostname using the NetPulse DNS servers.</p>
  </div>

  <div style="max-width:640px;">
    <form method="post" class="detail-panel">
      <div class="form-group">
        <label>HOSTNAME</label>
        <input type="text" name="hostname" value="{{ hostname }}" placeholder="www.example.com" autofocus>
      </div>
      <button class="btn" type="submit">Resolve</button>
    </form>

    {% if error %}
    <div class="alert alert-error mt2">{{ error }}</div>
    {% endif %}

    {% if output %}
    <div class="section-title mt3">OUTPUT</div>
    <div class="terminal-box">{{ output }}</div>
    {% endif %}
  </div>

  <p class="mt3"><a href="{{ url_for('tools_linkcheck') }}">&rarr; Link Checker Tool</a></p>
</div>
{% endblock %}
