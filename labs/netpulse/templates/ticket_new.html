{% extends 'base.html' %}
{% block title %}New Ticket{% endblock %}
{% block content %}
<div class="container" style="max-width:700px;">
  <div class="page-header">
    <h1>NEW SUPPORT TICKET</h1>
  </div>
  {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
  <form method="post" class="detail-panel">
    <div class="form-group">
      <label>SUBJECT</label>
      <input type="text" name="subject" autofocus>
    </div>
    <div class="form-group">
      <label>MESSAGE</label>
      <textarea name="body" rows="6" placeholder="Describe your issue..."></textarea>
    </div>
    <button class="btn" type="submit">Submit Ticket</button>
    &nbsp;<a href="{{ url_for('tickets') }}" class="btn btn-sm btn-amber">Cancel</a>
  </form>
</div>
{% endblock %}
