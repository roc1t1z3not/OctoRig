{% extends 'base.html' %}
{% block title %}Password Reset{% endblock %}
{% block content %}
<div class="form-card">
  <h2>[ PASSWORD RESET ]</h2>
  {% if token_info %}
  <div class="alert alert-info">
    Reset link generated. Token: <strong>{{ token_info }}</strong>
    <br><a href="{{ url_for('reset_confirm', token=token_info) }}">Click here to reset</a>
  </div>
  {% else %}
  <form method="post">
    <div class="form-group">
      <label>ACCOUNT EMAIL</label>
      <input type="email" name="email" autofocus>
    </div>
    <button class="btn" style="width:100%;">Request Reset</button>
  </form>
  {% endif %}
  <p style="margin-top:1rem;font-size:0.75rem;color:var(--muted);">
    <a href="{{ url_for('login') }}">&larr; Back to login</a>
  </p>
</div>
{% endblock %}
