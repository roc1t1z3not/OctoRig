{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="form-card">
  <h2>[ MEMBER LOGIN ]</h2>
  {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
  <form method="post" action="{{ url_for('login', next=next_url) }}">
    <div class="form-group">
      <label>USERNAME</label>
      <input type="text" name="username" autofocus>
    </div>
    <div class="form-group">
      <label>PASSWORD</label>
      <input type="password" name="password">
    </div>
    <button class="btn" style="width:100%;">Connect</button>
  </form>
  <p style="margin-top:1rem;font-size:0.75rem;color:var(--muted);">
    <a href="{{ url_for('reset_request') }}">Forgot password?</a>
    &nbsp;&bull;&nbsp;
    <a href="{{ url_for('register') }}">New account</a>
  </p>
</div>
{% endblock %}
