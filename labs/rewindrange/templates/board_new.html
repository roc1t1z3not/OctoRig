{% extends 'base.html' %}
{% block title %}New Thread{% endblock %}
{% block content %}
<div class="container" style="max-width:700px;">
  <div class="page-header">
    <h1>NEW THREAD</h1>
  </div>
  <div style="background:var(--surface);border:1px solid var(--border);padding:1.5rem;border-radius:3px;">
    <form method="post" action="{{ url_for('board_new') }}">
      <div class="form-group">
        <label>Title</label>
        <input type="text" name="title" placeholder="Thread title…" required>
      </div>
      <div class="form-group">
        <label>Body</label>
        <textarea name="body" rows="8" placeholder="What's on your mind…" style="resize:vertical;" required></textarea>
      </div>
      <div style="display:flex;gap:0.8rem;">
        <button type="submit" class="btn btn-pink">Post Thread</button>
        <a href="{{ url_for('board') }}" class="btn">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
