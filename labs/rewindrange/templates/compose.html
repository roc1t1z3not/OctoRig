{% extends 'base.html' %}
{% block title %}Compose Message{% endblock %}
{% block content %}
<div class="container" style="max-width:680px;">
  <div class="page-header">
    <h1>COMPOSE</h1>
  </div>
  <div style="background:var(--surface);border:1px solid var(--border);padding:1.5rem;border-radius:3px;">
    <form method="post" action="{{ url_for('inbox_compose') }}">
      <div class="form-group">
        <label>To</label>
        <select name="to_id" class="input-sm" style="width:100%;padding:0.5rem;">
          <option value="">— Select recipient —</option>
          {% for u in users %}
          <option value="{{ u.id }}" {{ 'selected' if to_id == u.id|string }}>{{ u.username }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Subject</label>
        <input type="text" name="subject" placeholder="Subject…" required>
      </div>
      <div class="form-group">
        <label>Message</label>
        <textarea name="body" rows="7" placeholder="Write your message…" style="resize:vertical;" required></textarea>
      </div>
      <div style="display:flex;gap:0.8rem;">
        <button type="submit" class="btn btn-pink">Send</button>
        <a href="{{ url_for('inbox') }}" class="btn">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
