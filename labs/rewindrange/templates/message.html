{% extends 'base.html' %}
{% block title %}{{ msg.subject }}{% endblock %}
{% block content %}
<div class="container" style="max-width:720px;">
  <div style="margin-bottom:1rem;">
    <a href="{{ url_for('inbox') }}" style="font-size:0.78rem;color:var(--muted);">&larr; Back to Inbox</a>
  </div>

  <div style="background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--cyan);padding:1.4rem 1.5rem;border-radius:0 3px 3px 0;">
    <h2 style="color:var(--cyan);margin-bottom:0.6rem;font-size:1.1rem;">{{ msg.subject }}</h2>
    <div style="font-size:0.72rem;color:var(--muted);margin-bottom:1rem;display:flex;gap:1.2rem;">
      <span>From: <a href="{{ url_for('account', user_id=msg.from_id) }}" style="color:var(--cyan);">{{ msg.from_username }}</a></span>
      <span>To: <a href="{{ url_for('account', user_id=msg.to_id) }}" style="color:var(--cyan);">{{ msg.to_username }}</a></span>
      <span>{{ msg.sent_at }}</span>
    </div>
    <div style="font-size:0.9rem;line-height:1.75;">{{ msg.body | safe }}</div>
  </div>

  <div style="margin-top:1rem;display:flex;gap:0.8rem;">
    <a href="{{ url_for('inbox_compose') }}?to={{ msg.from_id }}" class="btn btn-sm">Reply</a>
  </div>
</div>
{% endblock %}
