{% extends 'base.html' %}
{% block title %}Edit Reply{% endblock %}
{% block content %}
<div class="container" style="max-width:700px;">
  <div class="page-header">
    <h1>EDIT REPLY</h1>
  </div>
  <div style="background:var(--surface);border:1px solid var(--border);padding:1.5rem;border-radius:3px;">
    <form method="post" action="{{ url_for('reply_edit', reply_id=reply.id) }}">
      <div class="form-group">
        <label>Reply</label>
        <textarea name="body" rows="6" style="resize:vertical;" required>{{ reply.body }}</textarea>
      </div>
      <div style="display:flex;gap:0.8rem;">
        <button type="submit" class="btn btn-pink">Save</button>
        <a href="{{ url_for('board_thread', thread_id=reply.thread_id) }}" class="btn">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
