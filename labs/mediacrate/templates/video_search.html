{% extends "base.html" %}
{% block content %}
<h2>Search videos</h2>
<form method="GET" class="inline-form">
  <div>
    <label>Title contains</label>
    <input type="text" name="q" value="{{ q }}">
  </div>
  <button class="btn btn-sm" type="submit">Search</button>
</form>
{% if error %}<div class="alert alert-bad">{{ error }}</div>{% endif %}
{% if results %}
<table class="data" style="margin-top:1.4rem">
  <thead><tr><th>ID</th><th>Title</th><th>Description</th><th>Views</th></tr></thead>
  <tbody>
  {% for r in results %}
    <tr><td>{{ r[0] }}</td><td>{{ r[1] }}</td><td>{{ r[2] }}</td><td>{{ r[3] }}</td></tr>
  {% endfor %}
  </tbody>
</table>
{% endif %}
{% endblock %}
