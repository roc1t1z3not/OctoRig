{% extends "base.html" %}
{% block content %}
<h2>{{ item.title }}</h2>
<table class="kv">
  <tr><th>Site</th><td>{{ item.site_url }}</td></tr>
  <tr><th>Username</th><td>{{ item.item_user }}</td></tr>
  <tr><th>Password</th><td><code>{{ item.secret }}</code></td></tr>
  <tr><th>Notes</th><td>{{ item.notes }}</td></tr>
</table>

<h3>Report this item</h3>
<form method="POST" action="{{ url_for('vault_item_flag', item_id=item.id) }}" class="inline-form">
  <div>
    <label>Note for the review team</label>
    <input type="text" name="note" placeholder="Why are you flagging this item?">
  </div>
  <button class="btn btn-sm" type="submit">Submit report</button>
</form>
{% endblock %}
