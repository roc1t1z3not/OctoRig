{% extends "base.html" %}
{% block content %}
<h2>Your vaults</h2>
<div class="vs-list">
  {% for v in vaults %}
    <div class="vs-list-row">
      <div>
        <div class="vs-list-title">{{ v.name }}</div>
        <div class="vs-list-sub">Created {{ v.created_at }}</div>
      </div>
      <div class="vs-list-actions">
        <a class="btn btn-sm" href="{{ url_for('vault_detail', vault_id=v.id) }}">Open</a>
        <a class="btn btn-sm btn-amber" href="{{ url_for('vault_share', vault_id=v.id) }}">Share</a>
      </div>
    </div>
  {% endfor %}
</div>

<h2 style="margin-top:2rem">Shared with you</h2>
<div class="vs-list">
  {% for v in shared %}
    <div class="vs-list-row">
      <div class="vs-list-title">{{ v.name }}</div>
      <a class="btn btn-sm" href="{{ url_for('vault_detail', vault_id=v.id) }}">Open</a>
    </div>
  {% else %}
    <div class="vs-list-row"><span class="muted">No vaults have been shared with you yet.</span></div>
  {% endfor %}
</div>
{% endblock %}
