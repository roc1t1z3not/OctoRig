{% extends 'base.html' %}
{% block title %}{{ msg.subject }}{% endblock %}
{% block content %}
<div class="container" style="max-width:680px;">
  <div style="margin-bottom:1rem;"><a href="{{ url_for('inbox') }}" style="color:var(--muted);font-size:0.82rem;">&larr; Messages</a></div>
  <div class="page-header">
    <h1>{{ msg.subject }}</h1>
    <p>
      From <strong>{{ msg.from_name or msg.from_user }}</strong>
      to <strong>{{ msg.to_name or msg.to_user }}</strong>
      &mdash; {{ msg.sent_at }}
    </p>
  </div>
  <div class="card">
    <div style="font-size:0.9rem;line-height:1.8;">{{ msg.body | safe }}</div>
  </div>
  <div style="margin-top:1rem;">
    <a href="{{ url_for('message_new') }}?to={{ msg.from_user }}" class="btn btn-primary btn-sm">Reply</a>
    <a href="{{ url_for('inbox') }}" class="btn btn-sm" style="margin-left:0.5rem;">Back</a>
  </div>
</div>
{% endblock %}
