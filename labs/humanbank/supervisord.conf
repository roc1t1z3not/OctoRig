[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

[program:flask]
command=python /app/app.py
autostart=true
autorestart=true
stdout_logfile=/dev/null
stderr_logfile=/dev/null

[program:sshd]
command=/usr/sbin/sshd -D -e
autostart=true
autorestart=true
stdout_logfile=/dev/null
stderr_logfile=/dev/null

[program:vsftpd]
command=/usr/sbin/vsftpd /etc/vsftpd.conf
autostart=true
autorestart=true
stdout_logfile=/dev/null
stderr_logfile=/dev/null

[program:redis]
command=redis-server --bind 0.0.0.0 --protected-mode no
autostart=true
autorestart=true
stdout_logfile=/dev/null
stderr_logfile=/dev/null
