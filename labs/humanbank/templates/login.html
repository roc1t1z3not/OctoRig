{% extends 'base.html' %}
{% block title %}Sign In{% endblock %}
{% block content %}
<div style="display:flex;justify-content:center;padding:4rem 1rem;">
  <div style="width:100%;max-width:400px;">
    <div style="text-align:center;margin-bottom:2rem;">
      <h1 style="color:var(--accent);font-size:1.5rem;font-weight:700;">HUMAN<span style="color:var(--gold);">BANK</span></h1>
      <p style="color:var(--muted);font-size:0.85rem;margin-top:0.3rem;">Sign in to your account</p>
    </div>
    <div class="panel">
      {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
      {% endif %}
      <form method="post" action="{{ url_for('login') }}">
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;padding:0.65rem;">Sign In</button>
      </form>
      <p style="margin-top:1rem;font-size:0.82rem;color:var(--muted);text-align:center;">
        <a href="{{ url_for('reset_request') }}">Forgot password?</a>
        &nbsp;&middot;&nbsp;
        <a href="{{ url_for('register') }}">Open an account</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
