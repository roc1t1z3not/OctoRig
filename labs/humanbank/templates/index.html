{% extends 'base.html' %}
{% block title %}Welcome{% endblock %}
{% block content %}
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;text-align:center;padding:2rem;">
  <div style="font-size:0.78rem;letter-spacing:0.16em;color:var(--muted);text-transform:uppercase;margin-bottom:1rem;">Welcome to</div>
  <h1 style="font-size:3rem;font-weight:800;color:var(--accent);letter-spacing:0.04em;margin-bottom:0.3rem;">HUMAN<span style="color:var(--gold);">BANK</span></h1>
  <p style="color:var(--muted);font-size:1rem;margin-bottom:2.5rem;">Secure. Simple. Digital Banking.</p>
  <div style="display:flex;gap:1rem;">
    <a href="{{ url_for('login') }}" class="btn btn-primary" style="padding:0.65rem 2rem;font-size:0.95rem;">Sign In</a>
    <a href="{{ url_for('register') }}" class="btn btn-gold" style="padding:0.65rem 2rem;font-size:0.95rem;">Open Account</a>
  </div>
  <div style="margin-top:3rem;display:grid;grid-template-columns:repeat(3,1fr);gap:2rem;max-width:640px;">
    <div>
      <div style="color:var(--accent);font-size:1.5rem;margin-bottom:0.5rem;">⚡</div>
      <div style="font-size:0.82rem;color:var(--muted);">Instant transfers between accounts</div>
    </div>
    <div>
      <div style="color:var(--gold);font-size:1.5rem;margin-bottom:0.5rem;">🔒</div>
      <div style="font-size:0.82rem;color:var(--muted);">Bank-grade security on every transaction</div>
    </div>
    <div>
      <div style="color:var(--green);font-size:1.5rem;margin-bottom:0.5rem;">📊</div>
      <div style="font-size:0.82rem;color:var(--muted);">Full transaction history and search</div>
    </div>
  </div>
</div>
{% endblock %}
