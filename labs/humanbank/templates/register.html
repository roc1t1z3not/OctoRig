{% extends 'base.html' %}
{% block title %}Open Account{% endblock %}
{% block content %}
<div style="display:flex;justify-content:center;padding:3rem 1rem;">
  <div style="width:100%;max-width:440px;">
    <div style="text-align:center;margin-bottom:2rem;">
      <h1 style="color:var(--accent);font-size:1.5rem;font-weight:700;">Open an Account</h1>
      <p style="color:var(--muted);font-size:0.85rem;margin-top:0.3rem;">Join HumanBank today</p>
    </div>
    <div class="panel">
      {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
      {% endif %}
      <form method="post">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="full_name" placeholder="Jane Smith">
        </div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" placeholder="jane.smith" required>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;padding:0.65rem;">Create Account</button>
      </form>
      <p style="margin-top:1rem;font-size:0.82rem;color:var(--muted);text-align:center;">
        Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
