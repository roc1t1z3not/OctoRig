{% extends 'base.html' %}
{% block title %}New Ticket{% endblock %}
{% block content %}
<div class="container" style="max-width:640px;">
  <div style="margin-bottom:1rem;"><a href="{{ url_for('tickets') }}" style="color:var(--muted);font-size:0.82rem;">&larr; Support Tickets</a></div>
  <div class="page-header">
    <h1>OPEN A TICKET</h1>
    <p>Describe your issue and our team will respond</p>
  </div>
  <div class="panel">
    <form method="post">
      <div class="form-group">
        <label>Subject</label>
        <input type="text" name="subject" placeholder="Brief description of your issue" required autofocus>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea name="body" rows="6" style="resize:vertical;" placeholder="Please describe the issue in detail…" required></textarea>
      </div>
      <div style="display:flex;gap:0.75rem;">
        <button type="submit" class="btn btn-primary">Submit Ticket</button>
        <a href="{{ url_for('tickets') }}" class="btn">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
