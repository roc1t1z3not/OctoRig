{% extends 'base.html' %}
{% block title %}Transfer Chips{% endblock %}
{% block content %}
<div class="form-card" style="max-width:520px;">
  <h2>♠ Transfer Chips</h2>
  {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
  {% if success %}<div class="alert alert-success">{{ success }}</div>{% endif %}

  <!-- VULN: CSRF — no token; IDOR — from_user_id taken from form -->
  <form method="post">
    <div class="form-group">
      <label>From Account</label>
      <!-- VULN: IDOR — attacker can set this to any user_id to drain their balance -->
      <select name="from_user_id">
        {% for u in users %}
        <option value="{{ u.id }}" {% if u.id == user.id %}selected{% endif %}>
          {{ u.username }} (#{{ u.id }})
        </option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>To Account</label>
      <select name="to_user_id">
        {% for u in users %}
        <option value="{{ u.id }}" {% if u.id != user.id %}selected{% endif %}>
          {{ u.username }} (#{{ u.id }})
        </option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>Amount ($)</label>
      <input type="number" name="amount" value="100" min="0.01" step="0.01">
    </div>
    <div class="form-group">
      <label>Note (optional)</label>
      <input type="text" name="note" placeholder="Reason for transfer…">
    </div>
    <button class="btn btn-primary" style="width:100%;">Transfer</button>
  </form>
</div>
{% endblock %}
