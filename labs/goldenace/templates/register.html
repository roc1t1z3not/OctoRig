{% extends 'base.html' %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="form-card">
  <h2>♥ Create Account</h2>
  <div class="alert alert-info">New accounts receive <strong>$1,000</strong> in starting chips.</div>
  {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
  <form method="post">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" autocomplete="username" required>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" autocomplete="email" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" autocomplete="new-password" required>
    </div>
    <button class="btn btn-primary" style="width:100%;">Create Account</button>
  </form>
  <p style="margin-top:1rem;text-align:center;font-size:0.85rem;color:var(--muted);">
    Already have an account? <a href="{{ url_for('login') }}">Log in</a>
  </p>
</div>
{% endblock %}
