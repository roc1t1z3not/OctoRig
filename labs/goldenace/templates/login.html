{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="form-card">
  <h2>♠ Sign In</h2>
  {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
  <form method="post">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" autocomplete="username" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" autocomplete="current-password" required>
    </div>
    <button class="btn btn-primary" style="width:100%;">Log In</button>
  </form>
  <p style="margin-top:1rem;text-align:center;font-size:0.85rem;color:var(--muted);">
    No account? <a href="{{ url_for('register') }}">Join now</a> &nbsp;&middot;&nbsp;
    <a href="{{ url_for('reset_request') }}">Forgot password?</a>
  </p>
</div>
{% endblock %}
